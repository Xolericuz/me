<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XOLƎRIƆ</title>
    <style>
        :root {
            --bg: #05070a;
            --card: rgba(255,255,255,0.05);
            --accent: #00f0ff;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- NAVIGATSIYA --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            background: rgba(5, 7, 10, 0.8);
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }

        /* --- HERO QISMI --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 0 20px;
            background: radial-gradient(circle at center, #0a0f14, #05070a);
        }

        .hero h1 {
            font-size: 4.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00f0ff, #0077ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.7;
            max-width: 600px;
        }

        /* --- SCROLL PARALLAX ANIMATSIYA QISMI --- */
        .parallax-section {
            position: relative;
            height: 120vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #05070a;
            overflow: hidden;
        }

        .parallax-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* MANA SIZ TOPGAN HAQIQIY RASM MANZILI QO'YILDI */
            background-image: url('https://i.ibb.co/JjJ2mjS4/1775193815209-edit-90965910067883.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
            opacity: 0; /* Boshida ko'rinmaydi */
            transition: opacity 2.5s ease-in-out; /* 2.5 soniyada sekin asil holatga chiqadi */
            z-index: 1;
        }

        /* Ekranga kelganda to'liq 100% asil holatida ko'rinadi */
        .parallax-section.visible .parallax-bg {
            opacity: 1; 
        }

        .parallax-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
            opacity: 0;
            transform: translateY(50px); 
            transition: all 1.5s ease-out;
            
            /* Matnlar rasmga qorishib ketmasligi uchun orqa foniga shisha effekti berildi */
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 240, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            max-width: 800px;
        }

        .parallax-section.visible .parallax-content {
            opacity: 1; 
            transform: translateY(0);
        }

        .parallax-content h2 {
            font-size: 3.5rem;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
            margin-bottom: 20px;
        }

        .parallax-content p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #e0e0e0;
        }

        /* --- IJTIMOIY TARMOQLAR --- */
        .socials {
            padding: 100px 20px;
            text-align: center;
            background: #05070a;
        }

        .socials h2 {
            font-size: 2.5rem;
            margin-bottom: 40px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .social-links a {
            text-decoration: none;
            color: var(--text);
            font-size: 1.2rem;
            padding: 15px 40px;
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 30px;
            background: var(--card);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
            transform: translateY(-5px);
        }

        /* --- CHAT VIDJETI --- */
        .chat-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 65px;
            height: 65px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #000;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 240, 255, 0.4);
            z-index: 1000;
            transition: 0.3s;
        }

        .chat-btn:hover {
            transform: scale(1.1);
        }

        .chat-window {
            position: fixed;
            bottom: 100px;
            right: 25px;
            width: 350px;
            height: 450px;
            background: rgba(10, 15, 20, 0.95);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(20px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .chat-window.active {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .chat-header {
            padding: 15px 20px;
            background: rgba(0, 240, 255, 0.1);
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .chat-header span {
            cursor: pointer;
            color: var(--accent);
            font-size: 22px;
            transition: 0.3s;
        }

        .chat-header span:hover {
            color: #ff4444;
            transform: rotate(90deg);
        }

        .chat-body {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 85%;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg.user {
            background: var(--accent);
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 3px;
        }

        .msg.bot {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 3px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .chat-input {
            display: flex;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(0, 240, 255, 0.2);
        }

        .chat-input input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-radius: 10px;
            outline: none;
            font-size: 0.95rem;
        }

        .chat-input input:focus {
            background: rgba(255, 255, 255, 0.1);
        }

        .chat-input button {
            background: transparent;
            color: var(--accent);
            border: none;
            padding: 0 15px;
            font-size: 22px;
            cursor: pointer;
            transition: 0.3s;
        }

        .chat-input button:hover {
            transform: scale(1.2);
        }

        /* --- MOBIL MOSLASHUVCHANLIK --- */
        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            .parallax-content h2 { font-size: 2.2rem; }
            .chat-window {
                width: calc(100% - 40px);
                right: 20px;
                bottom: 100px;
                height: 60vh;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">XOLƎRIƆ</div>
    </nav>

    <section class="hero">
        <h1>XOLƎRIƆ</h1>
        <p>xush kelibsiz.</p>
    </section>

    <section class="parallax-section" id="scrollArea">
        <div class="parallax-bg"></div>
        <div class="parallax-content">
            <h2>🧑‍💻</h2>
            <p>Eng katta muvaffaqiyatlar eng katta mag'lubiyatlardan keyin keladi.</p>
        </div>
    </section>

    <section class="socials">
        <h2>Tarmoqlar</h2>
        <div class="social-links">
            <a href="https://github.com/Xolericuz" target="_blank">GitHub</a>
            <a href="https://t.me/neoorg" target="_blank">Telegram</a>
            <a href="https://www.instagram.com/xoleric_?igsh=d2hhcW01eWdrODd5" target="_blank">Instagram</a>
        </div>
    </section>

    <div class="chat-btn" onclick="toggleChat()">💬</div>

    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            XOLƎRIƆ 
            <span onclick="toggleChat()">✕</span>
        </div>
        <div class="chat-body" id="chat">
            <div class="msg bot">Tizimga xush kelibsiz. Qanday yordam bera olaman?</div>
        </div>
        <div class="chat-input">
            <input type="text" id="input" placeholder="Xabar yozing..." onkeypress="handleEnter(event)">
            <button onclick="send()">➤</button>
        </div>
    </div>

    <script>
        // Scroll Animatsiya logikasi
        const scrollArea = document.getElementById('scrollArea');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                } else {
                    entry.target.classList.remove('visible'); 
                }
            });
        }, { threshold: 0.3 }); 

        observer.observe(scrollArea);

        // Chat logikasi
        function toggleChat(){
            document.getElementById('chatWindow').classList.toggle('active');
        }

        function handleEnter(e) {
            if (e.key === 'Enter') send();
        }

        const GEMINI_API_KEY = "AIzaSyDNZQgoXro59hHLe4uGKuEqrtl-Yat3eQY"; 

        const localDB = {
            "salom": "Assalomu alaykum! XOLƎRIƆ OS ga xush kelibsiz.",
            "qalay": "Rahmat, men sun'iy intellektman, ishlashga doim tayyorman!",
            "xoleric": "Xoleric - bu ushbu tizim muallifi va zamonaviy dasturchi.",
            "loyiha": "Bu XOLƎRIƆ loyihasi bo'lib, o'zida zamonaviy dizayn va kiber uslubni jamlagan."
        };

        async function send(){
            let input = document.getElementById('input');
            let chat = document.getElementById('chat');
            let text = input.value.trim();
            let lowerText = text.toLowerCase();

            if(text === "") return;

            appendMessage(text, 'user');
            input.value = "";

            let foundInDB = false;
            for (let key in localDB) {
                if (lowerText.includes(key)) {
                    setTimeout(() => appendMessage(localDB[key], 'bot'), 600);
                    foundInDB = true;
                    break;
                }
            }

            if (!foundInDB) {
                const loadingId = "load-" + Date.now();
                setTimeout(() => appendMessage("Ma'lumot izlanmoqda...", 'bot', loadingId), 400);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: text }] }]
                        })
                    });

                    const data = await response.json();
                    
                    if(data.error) {
                        document.getElementById(loadingId).remove();
                        appendMessage("API Xatosi: " + data.error.message, 'bot');
                        return;
                    }

                    const botReply = data.candidates[0].content.parts[0].text;
                    
                    document.getElementById(loadingId).remove();
                    appendMessage(botReply, 'bot');

                } catch (error) {
                    if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                    appendMessage("Xatolik yuz berdi. Internetni tekshiring.", 'bot');
                }
            }
        }

        function appendMessage(text, sender, id = null) {
            const chat = document.getElementById('chat');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${sender}`;
            if (id) msgDiv.id = id;
            msgDiv.innerText = text; 
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
