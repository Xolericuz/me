<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XOLƎRIƆ</title>

    <style>
        /* --- DYNAMIC STYLES VA RANG ANIMATSIYASI --- */
        :root {
            --card: rgba(20, 20, 25, 0.4);
            --accent: #ff0044; 
            --text: #ffffff;
        }

        @keyframes themeShift {
            0%   { --accent: #ff003c; } /* Qizil */
            25%  { --accent: #c0c0c0; } /* Kumush */
            50%  { --accent: #00f0ff; } /* Moviy */
            75%  { --accent: #8a2be2; } /* Binafsha */
            100% { --accent: #ff003c; }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            animation: themeShift 20s infinite alternate linear;
            background-color: #000; /* Asosiy qora fon */
        }

        /* --- 1-QATLAM: ORQA FON RASMI --- */
        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Siz tanlagan rasm havolasi */
            background-image: url('https://i.ibb.co/JjJ2mjS4/1775193815209-edit-90965910067883.png'); 
            background-size: cover;
            background-position: center;
            z-index: 1; 
            opacity: 0.55; /* Matnlar va 3D kublar yaxshi ko'rinishi uchun */
        }

        /* --- 2-QATLAM: 3D KANVAS (MICRO KUBLAR) --- */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; 
            pointer-events: none; /* Elementlarni bosishga xalaqit bermasligi uchun */
        }

        /* --- 3-QATLAM: UI ELEMENTLAR --- */
        nav, .hero, .parallax-section, .socials, .chat-btn, .chat-window {
            position: relative;
            z-index: 10; 
        }

        /* --- LOADER --- */
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #050508;
            z-index: 9999;
            transition: opacity 0.8s ease-out;
        }
        .loader-text {
            color: var(--accent);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 8px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--accent);
            animation: pulse 1.3s infinite, themeShift 20s infinite alternate linear;
        }
        .loader-bar {
            width: 300px;
            height: 4px;
            background: #111;
            overflow: hidden;
            border-radius: 4px;
        }
        .loader-progress {
            width: 0%;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent);
            transition: width 0.3s ease;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* --- NAVIGATSIYA --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            backdrop-filter: blur(15px);
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 5px;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent);
            transition: color 0.5s ease;
        }

        /* --- HERO QISMI --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 5rem;
            font-weight: 800;
            color: transparent;
            -webkit-text-stroke: 2px var(--accent);
            text-shadow: 0 0 30px rgba(0,0,0,0.8);
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 1.4rem;
            opacity: 0.9;
            max-width: 600px;
            font-weight: 400;
            text-shadow: 0 2px 10px #000;
        }

        /* --- SCROLL SECTION --- */
        .parallax-section {
            height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .parallax-content {
            text-align: center;
            padding: 50px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 800px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s ease-out;
        }

        .parallax-section.visible .parallax-content {
            opacity: 1;
            transform: translateY(0);
        }

        .parallax-content h2 {
            font-size: 4rem;
            color: var(--accent);
            text-shadow: 0 0 25px var(--accent);
            margin-bottom: 20px;
        }

        .parallax-content p {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #e0e0e0;
        }

        /* --- IJTIMOIY TARMOQLAR --- */
        .socials {
            padding: 120px 20px;
            text-align: center;
        }

        .socials h2 {
            font-size: 3rem;
            margin-bottom: 50px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px #000;
        }

        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
        }

        .social-links a {
            text-decoration: none;
            color: var(--text);
            font-size: 1.2rem;
            padding: 18px 45px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            transition: all 0.4s;
            text-transform: uppercase;
            font-weight: bold;
        }

        .social-links a:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 10px 30px var(--accent);
            transform: translateY(-8px);
        }

        /* --- CHAT VIDJETI --- */
        .chat-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #000;
            cursor: pointer;
            box-shadow: 0 8px 30px var(--accent);
            transition: all 0.4s ease;
        }

        .chat-btn:hover { transform: scale(1.1) rotate(10deg); }

        .chat-window {
            position: fixed;
            bottom: 120px;
            right: 30px;
            width: 380px;
            height: 500px;
            background: rgba(10, 10, 15, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(25px);
            opacity: 0;
            pointer-events: none;
            transform: translateY(30px);
            transition: all 0.4s;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        .chat-window.active {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .chat-header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--accent);
            font-weight: bold;
            letter-spacing: 2px;
        }

        .chat-header span { cursor: pointer; color: #fff; font-size: 24px; transition: 0.3s; }
        .chat-header span:hover { color: var(--accent); transform: rotate(90deg); }

        .chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 15px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .msg.user { background: var(--accent); color: #000; align-self: flex-end; font-weight: 600; border-bottom-right-radius: 3px; }
        .msg.bot { background: rgba(255, 255, 255, 0.1); align-self: flex-start; border-bottom-left-radius: 3px; border: 1px solid rgba(255,255,255,0.05); }
        
        .chat-input { display: flex; padding: 15px; background: rgba(0,0,0,0.8); border-top: 1px solid rgba(255,255,255,0.05); }
        .chat-input input { flex: 1; padding: 12px 18px; border-radius: 12px; border: none; background: rgba(255,255,255,0.1); color: #fff; font-size: 1rem; outline: none; }
        .chat-input input:focus { background: rgba(255,255,255,0.15); }
        .chat-input button { background: none; border: none; color: var(--accent); font-size: 26px; padding-left: 15px; cursor: pointer; transition: 0.3s; }
        .chat-input button:hover { transform: scale(1.2); }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3.5rem; }
            .parallax-content h2 { font-size: 2.5rem; }
            .chat-window { width: calc(100% - 40px); right: 20px; bottom: 110px; height: 65vh; }
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>
</head>
<body>

    <div id="bg-image"></div>

    <div id="canvas-container"></div>

    <div id="loader">
        <div class="loader-text">XOLƎRIƆ CORE</div>
        <div class="loader-bar"><div class="loader-progress" id="progress-bar"></div></div>
    </div>

    <nav>
        <div class="logo">XOLƎRIƆ</div>
    </nav>

    <section class="hero">
        <h1>XOLƎRIƆ</h1>
        <p>xush kelibsiz.</p>
    </section>

    <section class="parallax-section" id="scrollArea">
        <div class="parallax-content">
            <h2>🧑‍💻</h2>
            <p>Eng katta muvaffaqiyatlar eng katta mag'lubiyatlardan keyin keladi.</p>
        </div>
    </section>

    <section class="socials">
        <h2>Tarmoqlar</h2>
        <div class="social-links">
            <a href="https://github.com/Xolericuz" target="_blank">GitHub</a>
            <a href="https://t.me/neoorg" target="_blank">Telegram</a>
            <a href="https://www.instagram.com/xoleric_?igsh=d2hhcW01eWdrODd5" target="_blank">Instagram</a>
        </div>
    </section>

    <div class="chat-btn" onclick="toggleChat()">💬</div>
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">XOLƎRIƆ <span onclick="toggleChat()">✕</span></div>
        <div class="chat-body" id="chat">
            <div class="msg bot">Tizimga xush kelibsiz. Qanday yordam bera olaman?</div>
        </div>
        <div class="chat-input">
            <input type="text" id="input" placeholder="Buyruq kiriting..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">➤</button>
        </div>
    </div>

    <script>
        // Scroll Animatsiyasi
        const scrollArea = document.getElementById('scrollArea');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                } else {
                    entry.target.classList.remove('visible'); 
                }
            });
        }, { threshold: 0.3 }); 
        observer.observe(scrollArea);

        // Chat funksiyalari
        function toggleChat(){ document.getElementById('chatWindow').classList.toggle('active'); }

        const GEMINI_API_KEY = "AIzaSyDNZQgoXro59hHLe4uGKuEqrtl-Yat3eQY"; 
        const localDB = {
            "salom": "Assalomu alaykum! XOLƎRIƆ OS ga xush kelibsiz.",
            "qalay": "Rahmat, men sun'iy intellektman, ishlashga doim tayyorman!",
            "xoleric": "Xoleric - bu ushbu tizim muallifi va zamonaviy dasturchi.",
            "loyiha": "Bu XOLƎRIƆ loyihasi bo'lib, o'zida zamonaviy dizayn va kiber uslubni jamlagan."
        };

        async function send(){
            let input = document.getElementById('input');
            let text = input.value.trim();
            let lowerText = text.toLowerCase();
            if(text === "") return;

            appendMessage(text, 'user');
            input.value = "";

            let foundInDB = false;
            for (let key in localDB) {
                if (lowerText.includes(key)) {
                    setTimeout(() => appendMessage(localDB[key], 'bot'), 600);
                    foundInDB = true; break;
                }
            }

            // Agar localDB da topilmasa, Gemini API ga so'rov jo'natish
            if (!foundInDB) {
                const loadingId = "load-" + Date.now();
                setTimeout(() => appendMessage("Ma'lumot izlanmoqda...", 'bot', loadingId), 400);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                    });
                    const data = await response.json();
                    
                    if(data.error) {
                        document.getElementById(loadingId).remove();
                        appendMessage("API Xatosi: " + data.error.message, 'bot');
                        return;
                    }

                    const botReply = data.candidates[0].content.parts[0].text;
                    document.getElementById(loadingId).remove();
                    appendMessage(botReply, 'bot');

                } catch (error) {
                    if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                    appendMessage("Xatolik yuz berdi. Internetni tekshiring.", 'bot');
                }
            }
        }

        function appendMessage(text, sender, id = null) {
            const chat = document.getElementById('chat');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${sender}`;
            if (id) msgDiv.id = id;
            msgDiv.innerText = text; 
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        class MicroCores {
            constructor(){
                this.container = document.getElementById('canvas-container');
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.time = 0;
                
                // Animatsiya ranglari
                this.colorPalette = [
                    new THREE.Color('#ff003c'), 
                    new THREE.Color('#c0c0c0'), 
                    new THREE.Color('#00f0ff'), 
                    new THREE.Color('#8a2be2')
                ];
                this.currentColor = new THREE.Color('#ff003c');
                this.targetColor = new THREE.Color('#c0c0c0');
                this.colorIndex = 0;
                this.colorLerpFactor = 0;

                this.scrollY = window.scrollY;
                this.cubesData = []; 

                this.initScene();
                this.createMicroCores();
                this.addListeners();
                this.simulateLoading();
                this.animate();
            }

            simulateLoading(){
                let progress = 0;
                const bar = document.getElementById('progress-bar');
                const loader = document.getElementById('loader');
                const interval = setInterval(() => {
                    progress += Math.random() * 20;
                    if(progress >= 100) {
                        progress = 100;
                        clearInterval(interval);
                        setTimeout(() => {
                            loader.style.opacity = '0';
                            setTimeout(() => loader.style.display = 'none', 800);
                        }, 300);
                    }
                    bar.style.width = progress + '%';
                }, 50);
            }

            initScene(){
                this.scene = new THREE.Scene();
                // Alpha: true orqali canvas ni shaffof qilamiz, shunda rasm ko'rinadi
                this.renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
                this.renderer.setClearColor(0x000000, 0); 
                this.renderer.setSize(this.width, this.height);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.container.appendChild(this.renderer.domElement);

                this.camera = new THREE.PerspectiveCamera(50, this.width / this.height, 0.1, 100);
                this.camera.position.z = 10;

                this.ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
                this.scene.add(this.ambientLight);

                this.pointLight = new THREE.PointLight(0xff003c, 20, 50);
                this.pointLight.position.set(0, 0, 5);
                this.scene.add(this.pointLight);
            }

            createCoreGeometry(x, y, scale, scrollYFactor, scrollXFactor) {
                const group = new THREE.Group();
                group.scale.set(scale, scale, scale);

                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 256;
                const texCtx = canvas.getContext('2d');
                const canvasTexture = new THREE.CanvasTexture(canvas);
                
                const coreMaterial = new THREE.MeshStandardMaterial({
                    map: canvasTexture,
                    color: 0xffffff,
                    metalness: 0.5,
                    roughness: 0.2,
                    emissive: 0x000000,
                    emissiveIntensity: 0.5
                });
                const coreCube = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), coreMaterial);
                group.add(coreCube);

                const cage = new THREE.Mesh(
                    new THREE.BoxGeometry(2.5, 2.5, 2.5), 
                    new THREE.MeshBasicMaterial({color: 0xffffff, wireframe: true, opacity: 0.4, transparent: true})
                );
                group.add(cage);

                const ringGeo = new THREE.TorusGeometry(3.5, 0.05, 8, 50);
                const ringMat = new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.6});
                const ring1 = new THREE.Mesh(ringGeo, ringMat);
                const ring2 = new THREE.Mesh(ringGeo, ringMat);
                ring1.rotation.x = Math.PI / 2;
                ring2.rotation.y = Math.PI / 2;
                group.add(ring1, ring2);

                this.scene.add(group);

                this.cubesData.push({
                    group: group,
                    coreCube: coreCube,
                    cage: cage,
                    ring1: ring1,
                    ring2: ring2,
                    texCtx: texCtx,
                    canvasTexture: canvasTexture,
                    baseX: x,
                    baseY: y,
                    scrollYFactor: scrollYFactor,
                    scrollXFactor: scrollXFactor,
                    pulseOffset: Math.random() * Math.PI * 2,
                    rotSpeedX: (Math.random() - 0.5) * 0.02,
                    rotSpeedY: (Math.random() - 0.5) * 0.02
                });
            }

            createMicroCores() {
                // Aniq 3 ta micro (kichik) kublar, scroll effekti uchun turli tezliklarda
                this.createCoreGeometry(-4, 3, 0.3, 0.015, 0.005);   // Chap tepada
                this.createCoreGeometry(5, -1, 0.2, -0.01, -0.008);  // O'ng o'rtada
                this.createCoreGeometry(-3, -4, 0.25, 0.02, 0.01);   // Chap pastda
            }

            updateTexture(cubeData, time){
                const ctx = cubeData.texCtx;
                ctx.fillStyle = 'rgba(5,5,8,0.9)'; 
                ctx.fillRect(0, 0, 256, 256);
                
                ctx.lineWidth = 8; 
                ctx.strokeStyle = this.currentColor.getStyle();
                ctx.strokeRect(15, 15, 226, 226);
                
                ctx.font = 'bold 35px Courier New'; 
                ctx.textAlign = 'center'; 
                ctx.textBaseline = 'middle';
                ctx.fillStyle = this.currentColor.getStyle();
                
                ctx.save(); 
                ctx.translate(128, 128); 
                ctx.fillText("XOLƎRIƆ", 0, -20);
                ctx.font = '20px Courier New'; 
                ctx.fillText("core", 0, 25); 
                ctx.restore();
                
                cubeData.canvasTexture.needsUpdate = true;
            }

            addListeners(){
                window.addEventListener('resize', () => {
                    this.width = window.innerWidth;
                    this.height = window.innerHeight;
                    this.camera.aspect = this.width / this.height; 
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(this.width, this.height); 
                });

                window.addEventListener('scroll', () => {
                    this.scrollY = window.scrollY;
                });
            }

            animate(){
                requestAnimationFrame(this.animate.bind(this));
                this.time += 0.02;

                this.colorLerpFactor += 0.005;
                if(this.colorLerpFactor >= 1) {
                    this.colorLerpFactor = 0;
                    this.colorIndex = (this.colorIndex + 1) % this.colorPalette.length;
                    this.targetColor = this.colorPalette[(this.colorIndex + 1) % this.colorPalette.length];
                }
                this.currentColor.copy(this.colorPalette[this.colorIndex]).lerp(this.targetColor, this.colorLerpFactor);
                this.pointLight.color.copy(this.currentColor);

                this.cubesData.forEach((data) => {
                    // Scroll bo'yicha ekranda harakatlanishi (Parallax effect)
                    const floatY = Math.sin(this.time + data.pulseOffset) * 0.3;
                    
                    data.group.position.y = data.baseY + floatY + (this.scrollY * data.scrollYFactor);
                    data.group.position.x = data.baseX + (this.scrollY * data.scrollXFactor);

                    // O'z o'qi atrofida aylanishi
                    data.coreCube.rotation.x += data.rotSpeedX;
                    data.coreCube.rotation.y += data.rotSpeedY;
                    
                    data.cage.material.color.copy(this.currentColor);
                    data.ring1.material.color.copy(this.currentColor);
                    data.ring2.material.color.copy(this.currentColor);
                    data.coreCube.material.emissive.copy(this.currentColor).multiplyScalar(0.4);

                    data.cage.rotation.copy(data.coreCube.rotation); 
                    data.cage.rotation.x *= -1;
                    data.ring1.rotation.x += 0.02; 
                    data.ring2.rotation.y -= 0.02; 

                    this.updateTexture(data, this.time);
                });

                this.renderer.render(this.scene, this.camera);
            }
        }

        new MicroCores();
    </script>
</body>
</html>
